# Inline so the resume PDF can render inside an <iframe>. (Attachment would
# fight the embed.) Download still works via the link’s download attribute / new tab.
[[headers]]
  for = "/assets/images/a_dennis_Resume_current.pdf"
  [headers.values]
    Content-Disposition = "inline"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Content-Disposition = "inline"
